name: taskflow_pro
description: A beautiful and feature-rich To Do List application for Iranian users.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # Local Database
  sqflite: ^2.3.0
  path: ^1.8.3
  
  # Shared Preferences
  shared_preferences: ^2.2.2
  
  # UUID for unique IDs
  uuid: ^4.2.2
  
  # Date/Time utilities
  intl: ^0.19.0
  
  # Animations
  flutter_animate: ^4.3.0
  
  # Icons
  cupertino_icons: ^1.0.6
  
  # Notifications (optional but great for reminders)
  flutter_local_notifications: ^16.3.0
  
  # Permission handler
  permission_handler: ^11.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: Vazirmatn
      fonts:
        - asset: assets/fonts/Vazirmatn-Regular.ttf
          weight: 400
        - asset: assets/fonts/Vazirmatn-Medium.ttf
          weight: 500
        - asset: assets/fonts/Vazirmatn-Bold.ttf
          weight: 700
